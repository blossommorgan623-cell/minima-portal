<!DOCTYPE html>
<html>
<head>
    <title>Minima Connect</title>
    <script src="https://m.minima.global/js/minima.js"></script>
</head>
<body style="background-color: black; color: white; text-align: center; padding-top: 100px; font-family: sans-serif;">

    <h1>Minima Portal</h1>
    
    <button id="btn" style="padding: 20px; background: #31f031; font-weight: bold; cursor: pointer;">
        CLICK TO CONNECT
    </button>

    <h2 id="address-display" style="margin-top: 20px; color: #31f031;"></h2>

    <script>
        document.getElementById('btn').onclick = function() {
            console.log("Button clicked...");
            
            // This is the direct command to MiniMask
            Minima.cmd("getaddress", function(res) {
                console.log(res);
                if(res.status) {
                    document.getElementById('address-display').innerText = res.response.address;
                    document.getElementById('btn').innerText = "CONNECTED";
                } else {
                    alert("Error: " + res.error + "\n\nMake sure MiniMask is UNLOCKED!");
                }
            });
        };

        Minima.init(function(msg) {
            console.log("Minima Status: " + msg.event);
        });
    </script>
</body>
</html>

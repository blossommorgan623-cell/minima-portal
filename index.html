<script>
    let isMinimaReady = false;

    // Initialize Minima
    Minima.init(function(msg) {
        console.log("Minima Event:", msg.event);

        if (msg.event === "inited") {
            isMinimaReady = true;
            console.log("Minima is ready");
        }
    });

    // Button click
    document.getElementById('btn').onclick = function() {

        if (typeof Minima === "undefined") {
            alert("MiniMask not detected. Open this in Minima browser.");
            return;
        }

        if (!isMinimaReady) {
            alert("Minima not ready yet. Try again...");
            return;
        }

        // Correct command
        Minima.cmd("getaddress", function(res) {
            console.log(res);

            if (res.status) {
                document.getElementById('address-display').innerText = res.response.address;
                document.getElementById('btn').innerText = "CONNECTED";
            } else {
                alert("Error: " + res.error);
            }
        });
    };
</script>
